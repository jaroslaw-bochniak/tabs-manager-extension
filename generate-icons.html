<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <h1>Icon Generator for Close Duplicate Tabs Extension</h1>
  <p>Click the buttons below to download icons. Then save them as icon16.png, icon48.png, and icon128.png in the extension folder.</p>
  
  <canvas id="canvas16" width="16" height="16" style="border: 1px solid #ccc; margin: 10px;"></canvas>
  <button onclick="downloadIcon(16)">Download 16x16</button><br>
  
  <canvas id="canvas48" width="48" height="48" style="border: 1px solid #ccc; margin: 10px;"></canvas>
  <button onclick="downloadIcon(48)">Download 48x48</button><br>
  
  <canvas id="canvas128" width="128" height="128" style="border: 1px solid #ccc; margin: 10px;"></canvas>
  <button onclick="downloadIcon(128)">Download 128x128</button>
  
  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(0, 0, size, size);
      
      // Draw X symbol (representing closing duplicates)
      ctx.strokeStyle = 'white';
      ctx.lineWidth = Math.max(2, size / 8);
      ctx.lineCap = 'round';
      
      const padding = size * 0.25;
      const center = size / 2;
      
      // Draw two overlapping X marks
      ctx.beginPath();
      ctx.moveTo(padding, padding);
      ctx.lineTo(center - padding * 0.3, center - padding * 0.3);
      ctx.moveTo(size - padding, padding);
      ctx.lineTo(center + padding * 0.3, center - padding * 0.3);
      ctx.moveTo(padding, size - padding);
      ctx.lineTo(center - padding * 0.3, center + padding * 0.3);
      ctx.moveTo(size - padding, size - padding);
      ctx.lineTo(center + padding * 0.3, center + padding * 0.3);
      ctx.stroke();
      
      // Draw a small circle in the center
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(center, center, size * 0.15, 0, 2 * Math.PI);
      ctx.fill();
    }
    
    function downloadIcon(size) {
      const canvas = document.getElementById(`canvas${size}`);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL();
      link.click();
    }
    
    // Draw icons on load
    window.onload = function() {
      drawIcon(document.getElementById('canvas16'), 16);
      drawIcon(document.getElementById('canvas48'), 48);
      drawIcon(document.getElementById('canvas128'), 128);
    };
  </script>
</body>
</html>
