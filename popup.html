<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background-color: #0c0c0e;
      color: #e4e4e7;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #71717a;
      margin: 0 0 4px 0;
      text-align: center;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    button {
      background-color: #18181b;
      color: #e4e4e7;
      border: 1px solid oklch(0.768 0.233 130.85);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      border-radius: 7px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      transition: background-color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 0 0 transparent;
      outline: none;
      position: relative;
    }

    button:hover {
      background-color: #27272a;
      border-color: oklch(0.84 0.233 130.85);
      box-shadow: 0 0 8px 0 oklch(0.768 0.233 130.85 / 0.15);
    }

    button:active {
      background-color: #1f1f22;
      border-color: oklch(0.62 0.233 130.85);
      box-shadow: none;
    }

    button:focus-visible {
      box-shadow: 0 0 0 2px #0c0c0e, 0 0 0 4px oklch(0.768 0.233 130.85);
    }

    button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      box-shadow: none;
    }

    button .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: oklch(0.768 0.233 130.85);
    }

    button .icon svg {
      width: 16px;
      height: 16px;
      shape-rendering: geometricPrecision;
    }

    button .icon svg[fill="none"] {
      fill: none;
      stroke: currentColor;
    }

    button .icon svg[fill="currentColor"],
    button .icon svg[fill]:not([fill="none"]) {
      fill: currentColor;
      stroke: none;
    }

    .badge {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      color: oklch(0.768 0.233 130.85);
      background: oklch(0.768 0.233 130.85 / 0.1);
      border: 1px solid oklch(0.768 0.233 130.85 / 0.25);
      border-radius: 4px;
      padding: 1px 6px;
      line-height: 1.5;
      letter-spacing: 0.02em;
    }

    .status {
      font-size: 12px;
      color: #71717a;
      min-height: 18px;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .success {
      color: oklch(0.768 0.233 130.85);
    }

    .error {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Tabs Manager</h1>
    <div class="button-group">
      <button id="sortTabsByHostBtn">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 5h.01" />
            <path d="M3 12h.01" />
            <path d="M3 19h.01" />
            <path d="M8 5h13" />
            <path d="M8 12h13" />
            <path d="M8 19h13" />
          </svg>
        </span>
        <span>Sort Tabs by Host</span>
      </button>
      <button id="closeDuplicatesBtn">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
          </svg>
        </span>
        <span>Close Exact Duplicates</span>
      </button>
      <button id="closeSameHostBtn">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="8" x="2" y="2" rx="2" ry="2"/>
            <rect width="20" height="8" x="2" y="14" rx="2" ry="2"/>
            <line x1="6" x2="6.01" y1="6" y2="6"/>
            <line x1="6" x2="6.01" y1="18" y2="18"/>
          </svg>
        </span>
        <span>Close Same Host</span>
      </button>
      <button id="closeCurrentAndSameHostBtn">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
            <line x1="22" x2="18" y1="12" y2="12"/>
            <line x1="6" x2="2" y1="12" y2="12"/>
            <line x1="12" x2="12" y1="6" y2="2"/>
            <line x1="12" x2="12" y1="22" y2="18"/>
          </svg>
        </span>
        <span>Close Current &amp; Same Host</span>
      </button>
      <button id="mergeAllWindowsBtn">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="9" height="7" rx="1"/>
            <rect x="13" y="3" width="9" height="7" rx="1"/>
            <rect x="7" y="14" width="10" height="7" rx="1"/>
            <path d="M7 7.5H2M22 7.5h-5M12 10.5v3.5"/>
          </svg>
        </span>
        <span>Merge All Windows</span>
      </button>
      <button id="closeMergedGitHubPRsBtn">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
        </span>
        <span>Close Merged GitHub PRs</span>
      </button>
    </div>
    <div id="status" class="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
